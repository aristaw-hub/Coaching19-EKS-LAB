apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: arista-echo-app-ingress
  namespace: arista-eks-activity
  annotations:
    external-dns.alpha.kubernetes.io/hostname: "arista-echoapp.sctp-sandbox.com" # Route53 Record
spec:
  ingressClassName: nginx
  rules:
  - host: "arista-echoapp.sctp-sandbox.com" # Route53 Record
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: arista-echo-service
            port:
              number: 80
